name: Build & Test (TCP)

on:
  workflow_call:
    inputs:
      framework:
        default: net10.0
        required: false
        type: string
      clickhouse-version:
        default: latest
        required: false
        type: string
      ref:
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (TCP)
    runs-on: ubuntu-22.04
    timeout-minutes: 15 # cold ClickHouse image pull + NuGet restore across the matrix

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/cache@v6
        name: Cache NuGet
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Test
        run: dotnet test ClickHouse.Driver.Tcp.Tests/ClickHouse.Driver.Tcp.Tests.csproj --framework ${{ inputs.framework }} --configuration Release --verbosity normal --logger GitHubActions /clp:ErrorsOnly
        env:
          CLICKHOUSE_VERSION: ${{ inputs.clickhouse-version }}
